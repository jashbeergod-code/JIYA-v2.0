name: Build Android APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Install dependencies
        run: npm install
        
      - name: Build APK locally
        run: npx eas build --platform android --profile preview --local --non-interactive --output ./Jiya-APK.apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jiya-APK
          path: Jiya-APK.apk
          retention-days: 7
